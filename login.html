<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
          background:linear-gradient(rgb(71, 88, 213),rgb(153, 64, 232));
          margin: 0;
          padding: 0;
          height: 100vh;
          font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    .container{
        width: 600px;
        background-color: aliceblue;
        padding: 60px;
        border-radius: 10px;
        margin-top: 100px;
        margin-left: 50px;
    }
    .container h1{
        font-size: 30px;
        text-align: left;
    }

    .form-group{ 

             display: flex;
              gap: 20px;
              margin-bottom: 20px;
    }
    input{
        text-align:left;
        padding-left: 10px;
    }
    .input-box{
        
        width:100%;
        
    }
    .form-group label{
        display: block;
        text-align: left;
        }
   .form-group input{

          width:100%;
          margin-bottom: 5px;
        
         
         
          padding-top: 15px;
          padding-bottom: 15px;

          border: 1px solid rgb(161, 123, 123);
          border-radius: 5px;

          font-size: 15px;
}

    button{
        width:80%;
        padding-bottom: 20px;
        padding-top: 10px;
        text-align: center;
        background:linear-gradient(rgb(71, 88, 213),rgb(153, 64, 232));
        font-size: 15px;
        border: 0cap;
    }
    button:hover{
        background:linear-gradient(rgb(153, 64, 232),rgb(71, 88, 213));
    }
    .gender{
        
        display: block;
        text-align: left;
    }
    .gender radio{
        text-align: center;
        gap: 40px;
    }
    
    
</style>
<body>
    <center>
    <div class ="container">
        <h1>Register Form</h1>
<div class="form-group">

    <div class="input-box">
      <label>Full name</label>
      <br>
      <input type="email" placeholder="Enter your name">
      </div>
      <div class="input-box">
      <label>User name</label><br>
      <input type="text" placeholder="Enter a username">
    </div>

  </div>

  <div class="form-group">

    <div class="input-box">
      <label>Email</label><br>
      <input type="email" placeholder="Enter a Mail id">
      </div>
      <div class="input-box">
      <label>Phone number</label><br>
      <input type="text" placeholder="Enter a Phone number">
    </div>

  </div>

   <div class="form-group">

    <div class="input-box">
      <label>Password</label>
      <br>
      <input type="email" placeholder="Enter a Password">
      </div>
      <div class="input-box">
      <label>User Name</label><br>
      <input type="text" placeholder="Confirm Password">
    </div>

  </div>

   <div class="gender">
    <p>Gender</p>
    <label>
    <input type="radio" name="gender"> Male
</label>

<label>
    <input type="radio" name="gender"> Female
</label>
<label>
    <input type="radio" name="gender"> Prefer for no Say
</label>
   </div>
 <br>
  <center> <button>Register</button></center>
</center>
  

    </div>
</body>
</html>
